version: "3.8"

services:
  db:
    image: mysql:8
    container_name: shg_mysql
    restart: always
    environment:
      MYSQL_DATABASE: shgproject
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: shg_backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_NAME=shgproject
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_HOST=db
      - DB_PORT=3306

  frontend:
    build: ./frontend
    container_name: shg_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
